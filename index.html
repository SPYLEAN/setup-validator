<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Startup Idea Validator & Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- CSS Reset & Variables --- */
        :root {
            /* Light Theme */
            --bg-body: #f0f4f8;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --surface: #ffffff;
            --danger: #ef4444;
            --success: #10b981;
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            
            /* Difficulty Colors */
            --diff-1: #10b981; /* Green */
            --diff-2: #fbbf24; /* Yellow */
            --diff-3: #f59e0b; /* Orange */
            --diff-4: #ef4444; /* Red */
            --diff-5: #991b1b; /* Dark Red */

            --radius: 16px;
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --bg-body: #111827;
            --glass-bg: rgba(31, 41, 55, 0.7);
            --glass-border: rgba(55, 65, 81, 0.5);
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --surface: #1f2937;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            transition: var(--transition);
            min-height: 100vh;
        }

        /* --- Glassmorphism Utils --- */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        /* --- Layout --- */
        header {
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .dashboard-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }
        @media (min-width: 768px) {
            .dashboard-layout { grid-template-columns: 350px 1fr; }
        }

        /* --- Components --- */
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid var(--text-muted); color: var(--text-main); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; font-weight: 500; }
        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            font-family: inherit;
        }
        option {
            background: var(--surface);
            color: var(--text-main);
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        /* --- Cards & Views --- */
        .view-controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .cards-grid {
            display: grid;
            gap: 1.5rem;
            grid-template-columns: 1fr;
        }
        @media (min-width: 1024px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1400px) { .cards-grid { grid-template-columns: repeat(3, 1fr); } }

        .kanban-board {
            display: none;
            gap: 1.5rem;
            overflow-x: auto;
            padding-bottom: 1rem;
        }
        .kanban-col {
            min-width: 300px;
            flex: 1;
            background: rgba(0,0,0,0.02);
            border-radius: var(--radius);
            padding: 1rem;
        }
        [data-theme="dark"] .kanban-col { background: rgba(255,255,255,0.02); }

        .compact-list { display: none; flex-direction: column; gap: 0.5rem; }
        .compact-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            border-radius: 8px;
        }

        .idea-card {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
        }
        .idea-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.15); }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .card-title { font-size: 1.125rem; font-weight: 600; cursor: pointer; }
        .card-title:hover { color: var(--primary); }

        .badges { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .badge {
            padding: 0.25rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }
        .badge-diff-1 { background: rgba(16, 185, 129, 0.1); color: var(--diff-1); border: 1px solid var(--diff-1); }
        .badge-diff-2 { background: rgba(251, 191, 36, 0.1); color: var(--diff-2); border: 1px solid var(--diff-2); }
        .badge-diff-3 { background: rgba(245, 158, 11, 0.1); color: var(--diff-3); border: 1px solid var(--diff-3); }
        .badge-diff-4 { background: rgba(239, 68, 68, 0.1); color: var(--diff-4); border: 1px solid var(--diff-4); }
        .badge-diff-5 { background: rgba(153, 27, 27, 0.1); color: var(--diff-5); border: 1px solid var(--diff-5); }
        .trending-badge { background: linear-gradient(45deg, #ff6b6b, #feca57); color: #000; }

        .desc-text {
            font-size: 0.875rem;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .desc-text.expanded { -webkit-line-clamp: unset; }
        .read-more { font-size: 0.75rem; color: var(--primary); cursor: pointer; background: none; border: none; }

        .ai-actions { display: flex; gap: 0.5rem; margin-top: auto; flex-wrap: wrap; }
        
        .progress-container { width: 100%; background: var(--glass-border); border-radius: 999px; height: 8px; overflow: hidden;}
        .progress-bar { height: 100%; transition: width 1s ease; }

        /* --- Modals --- */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; z-index: 1000;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            width: 90%; max-width: 800px;
            max-height: 90vh; overflow-y: auto;
            padding: 2rem; position: relative;
            transform: scale(0.95); transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .close-modal { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.5rem; color: var(--text-muted); cursor: pointer; }

        .swot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
        .swot-box { padding: 1rem; border-radius: 8px; background: rgba(0,0,0,0.03); }
        [data-theme="dark"] .swot-box { background: rgba(255,255,255,0.03); }
        .swot-box h4 { margin-bottom: 0.5rem; }
        .swot-S h4 { color: #10b981; } .swot-W h4 { color: #f59e0b; }
        .swot-O h4 { color: #3b82f6; } .swot-T h4 { color: #ef4444; }

        .stats-banner {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem; margin-bottom: 2rem;
        }
        .stat-box { padding: 1.5rem; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--primary); }
        .charts-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        canvas { width: 100% !important; height: 250px !important; }

        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #confettiCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }

        .toast {
            position: fixed; bottom: 20px; right: 20px;
            padding: 1rem 1.5rem; border-radius: 8px;
            background: var(--success); color: white;
            transform: translateY(100px); opacity: 0; transition: all 0.3s ease;
            z-index: 2000; box-shadow: var(--shadow);
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { background: var(--danger); }

        .tooltip {
            position: absolute; background: var(--primary); color: white;
            padding: 1rem; border-radius: 8px; z-index: 1001; max-width: 250px;
            box-shadow: var(--shadow); display: none;
        }

        .d-none { display: none !important; }
        .text-center { text-align: center; }
        .mt-1 { margin-top: 1rem; }
        .space-y-1 > * + * { margin-top: 0.5rem; }
        .slider-container { display: flex; align-items: center; gap: 1rem; }
        input[type="range"] { flex: 1; }
    </style>
</head>
<body>

    <header class="glass">
        <h1>🚀 AI Startup Validator</h1>
        <div style="display: flex; gap: 1rem; align-items: center;" id="navAuth">
            <!-- Populated via JS -->
        </div>
    </header>

    <div class="container dashboard-layout">
        <aside>
            <div class="glass" style="padding: 1.5rem; margin-bottom: 2rem;" id="step-form">
                <h2>Submit Idea</h2>
                <form id="ideaForm" class="mt-1">
                    <div class="form-group">
                        <label>Startup Title *</label>
                        <input type="text" id="iTitle" required>
                    </div>
                    <div class="form-group">
                        <label>Description (AI categorizes when done) *</label>
                        <textarea id="iDesc" rows="3" required></textarea>
                        <div id="aiCatLoader" class="d-none" style="font-size: 0.75rem; color: var(--primary); margin-top: 4px;">🤖 AI suggesting category...</div>
                    </div>
                    <div class="form-group">
                        <label>Problem Statement *</label>
                        <textarea id="iProb" rows="2" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Category *</label>
                        <select id="iCat" required>
                            <option value="">Select...</option>
                            <option value="FinTech">FinTech</option>
                            <option value="HealthTech">HealthTech</option>
                            <option value="EdTech">EdTech</option>
                            <option value="E-Commerce">E-Commerce</option>
                            <option value="AI/ML">AI/ML</option>
                            <option value="SaaS">SaaS</option>
                            <option value="CleanTech">CleanTech</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Difficulty (<span id="diffVal">3</span>/5) *</label>
                        <div class="slider-container">
                            <span>1</span>
                            <input type="range" id="iDiff" min="1" max="5" value="3">
                            <span>5</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Market Potential *</label>
                        <select id="iMarket" required>
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                            <option value="Very High">Very High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Tags (comma-separated)</label>
                        <input type="text" id="iTags" placeholder="b2b, subscription, mobile">
                    </div>
                    <div class="form-group">
                        <label>Expiry Duration (Hours, Optional)</label>
                        <input type="number" id="iExpiry" placeholder="e.g. 24">
                    </div>
                    <div id="formError" style="color: var(--danger); font-size: 0.875rem; margin-bottom: 1rem; display: none;"></div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;" id="btnSubmitForm">Add Startup Idea</button>
                    <input type="hidden" id="editId">
                </form>
            </div>

            <div class="glass" style="padding: 1.5rem;" id="step-filters">
                <h2>Filters & Search</h2>
                <div class="form-group mt-1">
                    <label>List Type</label>
                    <select id="fListType" onchange="fetchIdeas()">
                        <option value="active">Active Ideas</option>
                        <option value="trending">🔥 Trending Top 10</option>
                        <option value="archived">Archived (Expired)</option>
                        <option value="my">My Ideas</option>
                    </select>
                </div>
                <div class="form-group">
                    <input type="text" id="fSearch" placeholder="Search keywords..." oninput="renderApp()">
                </div>
                <div class="form-group">
                    <select id="fCat" onchange="renderApp()">
                        <option value="All">All Categories</option>
                        <option value="FinTech">FinTech</option>
                        <option value="HealthTech">HealthTech</option>
                        <option value="EdTech">EdTech</option>
                        <option value="E-Commerce">E-Commerce</option>
                        <option value="AI/ML">AI/ML</option>
                        <option value="SaaS">SaaS</option>
                        <option value="CleanTech">CleanTech</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <select id="fDiff" onchange="renderApp()">
                        <option value="All">All Difficulties</option>
                        <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
                    </select>
                </div>
                <div class="form-group">
                    <select id="fMarket" onchange="renderApp()">
                        <option value="All">All Markets</option>
                        <option value="Low">Low</option><option value="Medium">Medium</option><option value="High">High</option><option value="Very High">Very High</option>
                    </select>
                </div>
                <button class="btn btn-outline" style="width: 100%;" onclick="clearFilters()">Clear Filters</button>
            </div>
        </aside>

        <main>
            <div class="stats-banner" id="step-stats">
                <div class="glass stat-box">
                    <div style="font-size: 0.875rem; color: var(--text-muted);">Total Ideas</div>
                    <div class="stat-value" id="sTotal">0</div>
                </div>
                <div class="glass stat-box">
                    <div style="font-size: 0.875rem; color: var(--text-muted);">Avg Viability</div>
                    <div class="stat-value" id="sViability">0</div>
                </div>
                <div class="glass stat-box">
                    <div style="font-size: 0.875rem; color: var(--text-muted);">Top Category</div>
                    <div class="stat-value" style="font-size: 1.5rem" id="sCat">-</div>
                </div>
                <div class="glass stat-box">
                    <div style="font-size: 0.875rem; color: var(--text-muted);">Total Upvotes</div>
                    <div class="stat-value" id="sVotes">0</div>
                </div>
            </div>

            <div class="charts-container glass" style="padding: 1.5rem;">
                <div><canvas id="chartCat"></canvas></div>
                <div><canvas id="chartDiff"></canvas></div>
            </div>

            <div class="view-controls">
                <div style="display: flex; gap: 0.5rem;">
                    <button class="btn btn-primary" onclick="setView('grid')">Grid</button>
                    <!-- Removing Kanban temporarily for frontend simplicity, we didn't add the DB logic to store stage, so left as compact/grid. DB only supports active/hidden visibility. -->
                    <button class="btn btn-outline" onclick="setView('compact')">Compact</button>
                </div>
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <span id="resultCount" style="font-size: 0.875rem; color: var(--text-muted);">Showing 0 ideas</span>
                    <select id="fSort" onchange="renderApp()" style="width: auto; padding: 0.5rem; border-color: var(--glass-border); background: transparent;">
                        <option value="newest">Newest First</option>
                        <option value="votes">Most Votes</option>
                        <option value="viability">Highest Viability</option>
                        <option value="popularity">Popularity Score</option>
                        <option value="difficulty">Lowest Difficulty</option>
                        <option value="alpha">Alphabetical</option>
                    </select>
                </div>
            </div>

            <div id="viewGrid" class="cards-grid"></div>
            <div id="viewCompact" class="compact-list glass" style="padding: 1rem;"></div>

        </main>
    </div>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="authModal">
        <div class="modal-content glass" style="max-width: 400px; padding: 2rem;">
            <button class="close-modal" onclick="closeAuthModal()">&times;</button>
            <h2 id="authTitle" style="margin-bottom: 1rem;">Login</h2>
            <form id="authForm" class="mt-1">
                <div class="form-group" id="groupRegisterUsername" style="display:none">
                    <label>Username *</label>
                    <input type="text" id="authUsername">
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="authEmail" required>
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" id="authPassword" required>
                </div>
                <div id="authError" style="color: var(--danger); font-size: 0.875rem; margin-bottom: 1rem; display: none;"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;" id="authSubmitBtn">Login</button>
                <div style="text-align: center; margin-top: 1rem; font-size: 0.875rem;">
                    <span id="authToggleText">Don't have an account?</span> 
                    <a href="#" style="color: var(--primary);" onclick="toggleAuthMode(event)" id="authToggleLink">Register here</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Idea Detail Modal -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-content glass">
            <button class="close-modal" onclick="closeModal('detailModal')">&times;</button>
            <div class="badges" id="mdlBadges" style="margin-bottom: 1rem;"></div>
            <h2 id="mdlTitle" style="font-size: 2rem; margin-bottom: 0.5rem;"></h2>
            <p style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1.5rem;">Submitted by <span id="mdlAuthor"></span> | Created: <span id="mdlDate"></span> | Updated: <span id="mdlUpdated"></span> | Views: <span id="mdlViews"></span></p>
            
            <div style="display: grid; grid-template-columns: 1fr; gap: 1.5rem;">
                <div>
                    <h3>Overview</h3>
                    <p id="mdlDesc" class="mt-1"></p>
                    <h3 class="mt-1">Problem Statement</h3>
                    <p id="mdlProb" class="mt-1"></p>
                </div>
                <div class="glass" style="padding: 1rem;">
                    <h3>AI Analytics</h3>
                    <div class="mt-1" id="mdlAIPitchArea">
                        <button class="btn btn-primary" id="btnGenPitch">Generate Elevator Pitch</button>
                        <div id="resPitch" class="mt-1 d-none" style="padding: 1rem; background: rgba(0,0,0,0.05); border-radius: 8px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="confettiCanvas"></canvas>
    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const API_URL = 'https://setup-validator.onrender.com/api';
        let ideas = [];
        let currentTheme = localStorage.getItem('validator_theme') || 'light';
        let currentView = localStorage.getItem('validator_view') || 'grid';
        let activeIdeaId = null;
        let token = localStorage.getItem('validator_token') || null;
        let currentUser = localStorage.getItem('validator_user') || null;
        let authMode = 'login'; // 'login' or 'register'

        const MARKET_VALS = { 'Low': 1, 'Medium': 2, 'High': 3, 'Very High': 4 };
        const DIFF_COLORS = ['#10b981', '#fbbf24', '#f59e0b', '#ef4444', '#991b1b'];

        function init() {
            setTheme(currentTheme);
            setView(currentView);
            updateNav();
            
            document.getElementById('ideaForm').addEventListener('submit', handleFormSubmit);
            document.getElementById('authForm').addEventListener('submit', handleAuthSubmit);
            document.getElementById('iDiff').addEventListener('input', (e) => document.getElementById('diffVal').textContent = e.target.value);
            
            fetchIdeas();
            initCharts();
        }

        async function apiFetch(endpoint, method='GET', body=null) {
            const headers = {};
            if (body) headers['Content-Type'] = 'application/json';
            if (token) headers['Authorization'] = `Bearer ${token}`;
            
            try {
                const res = await fetch(`${API_URL}${endpoint}`, {
                    method, headers, body: body ? JSON.stringify(body) : null
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'API Error');
                return data;
            } catch(e) {
                showToast(e.message, true);
                throw e;
            }
        }

        function updateNav() {
            const nav = document.getElementById('navAuth');
            if(token && currentUser) {
                nav.innerHTML = `
                    <span style="font-size: 0.875rem;">Welcome, <strong>${currentUser}</strong></span>
                    <button class="btn btn-outline" style="border:none" onclick="logout()">Logout</button>
                    <button id="themeToggle" class="btn btn-outline" style="border:none" onclick="setTheme(currentTheme === 'light' ? 'dark' : 'light')">${currentTheme === 'dark' ? '☀️' : '🌙'}</button>
                `;
            } else {
                nav.innerHTML = `
                    <button class="btn btn-primary" onclick="openAuthModal()">Login / Register</button>
                    <button id="themeToggle" class="btn btn-outline" style="border:none" onclick="setTheme(currentTheme === 'light' ? 'dark' : 'light')">${currentTheme === 'dark' ? '☀️' : '🌙'}</button>
                `;
            }
        }

        // --- AUTH ---
        function openAuthModal() { document.getElementById('authModal').classList.add('active'); }
        function closeAuthModal() { document.getElementById('authModal').classList.remove('active'); document.getElementById('authForm').reset(); }
        
        function toggleAuthMode(e) {
            e.preventDefault();
            authMode = authMode === 'login' ? 'register' : 'login';
            document.getElementById('authTitle').textContent = authMode === 'login' ? 'Login' : 'Register';
            document.getElementById('authSubmitBtn').textContent = authMode === 'login' ? 'Login' : 'Register';
            document.getElementById('authToggleText').textContent = authMode === 'login' ? "Don't have an account?" : "Already have an account?";
            document.getElementById('authToggleLink').textContent = authMode === 'login' ? 'Register here' : 'Login here';
            document.getElementById('groupRegisterUsername').style.display = authMode === 'login' ? 'none' : 'block';
        }

        async function handleAuthSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            const username = document.getElementById('authUsername').value;

            try {
                const endpoint = authMode === 'login' ? '/auth/login' : '/auth/register';
                const body = authMode === 'login' ? { email, password } : { username, email, password };
                const res = await apiFetch(endpoint, 'POST', body);
                
                token = res.token;
                currentUser = res.username;
                localStorage.setItem('validator_token', token);
                localStorage.setItem('validator_user', currentUser);
                
                closeAuthModal();
                updateNav();
                showToast(`Logged in successfully!`);
                fetchIdeas();
            } catch(e) {}
        }

        function logout() {
            token = null; currentUser = null;
            localStorage.removeItem('validator_token');
            localStorage.removeItem('validator_user');
            updateNav();
            document.getElementById('fListType').value = 'active';
            fetchIdeas();
            showToast('Logged out');
        }

        // --- IDEAS CRUD API---
        async function fetchIdeas() {
            try {
                const listType = document.getElementById('fListType').value;
                let endpoint = '/ideas';
                if(listType === 'trending') endpoint = '/ideas/trending';
                if(listType === 'archived') endpoint = '/ideas/archived';
                if(listType === 'my') {
                    if(!token) return showToast('Please login to view your ideas', true);
                    endpoint = '/ideas/my';
                }
                
                const data = await apiFetch(endpoint);
                ideas = data;
                renderApp();
            } catch(e) {}
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            if(!token) return showToast('You must be logged in to submit an idea.', true);
            
            const isEdit = document.getElementById('editId').value;
            const body = {
                title: document.getElementById('iTitle').value.trim(),
                description: document.getElementById('iDesc').value.trim(),
                problem_statement: document.getElementById('iProb').value.trim(),
                category: document.getElementById('iCat').value,
                difficulty_score: parseInt(document.getElementById('iDiff').value),
                market_potential: document.getElementById('iMarket').value,
                tags: document.getElementById('iTags').value.split(',').map(t=>t.trim()).filter(t=>t),
            };
            
            const expiry = document.getElementById('iExpiry').value;
            if(expiry && !isEdit) body.expiry_duration = parseInt(expiry);

            try {
                if(isEdit) {
                    await apiFetch(`/ideas/${isEdit}`, 'PUT', body);
                    showToast('Idea updated successfully!');
                } else {
                    await apiFetch('/ideas', 'POST', body);
                    showToast('Idea created successfully!');
                }
                document.getElementById('ideaForm').reset();
                document.getElementById('editId').value = '';
                document.getElementById('diffVal').textContent = '3';
                document.getElementById('btnSubmitForm').textContent = 'Add Startup Idea';
                fetchIdeas();
            } catch(e) {}
        }

        async function handleUpvote(id, e) {
            if(e) e.stopPropagation();
            if(!token) return showToast('Please login to upvote!', true);
            try {
                await apiFetch(`/ideas/${id}/upvote`, 'POST');
                const idea = ideas.find(i=>i.id==id);
                if(idea) {
                    idea.upvotes++;
                    renderApp();
                    if([10, 25, 50].includes(idea.upvotes)) triggerConfetti();
                }
            } catch(e) {}
        }

        async function deleteIdea(id, e) {
            if(e) e.stopPropagation();
            if(confirm('Are you sure you want to delete this idea?')) {
                try {
                    await apiFetch(`/ideas/${id}`, 'DELETE');
                    fetchIdeas();
                    showToast('Deleted successfully');
                } catch(e) {}
            }
        }

        async function toggleVisibility(id, e) {
            if(e) e.stopPropagation();
            try {
                await apiFetch(`/ideas/${id}/visibility`, 'PATCH');
                fetchIdeas();
                showToast('Visibility toggled');
            } catch(e) {}
        }

        function editIdeaSetup(id, e) {
            if(e) e.stopPropagation();
            const idea = ideas.find(i => i.id == id);
            if(!idea) return;

            document.getElementById('editId').value = idea.id;
            document.getElementById('iTitle').value = idea.title;
            document.getElementById('iDesc').value = idea.description;
            document.getElementById('iProb').value = idea.problem_statement;
            document.getElementById('iCat').value = idea.category;
            document.getElementById('iDiff').value = idea.difficulty_score;
            document.getElementById('diffVal').textContent = idea.difficulty_score;
            document.getElementById('iMarket').value = idea.market_potential;
            document.getElementById('iTags').value = idea.tags.join(', ');
            
            document.getElementById('btnSubmitForm').textContent = 'Update Idea';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function calculateViability(idea) {
            const mScore = MARKET_VALS[idea.market_potential] || 0;
            return (mScore * 20) + (idea.upvotes * 2) - (idea.difficulty_score * 5);
        }

        function clearFilters() {
            document.getElementById('fSearch').value = '';
            document.getElementById('fCat').value = 'All';
            document.getElementById('fDiff').value = 'All';
            document.getElementById('fMarket').value = 'All';
            renderApp();
        }

        function getFiltered() {
            const search = document.getElementById('fSearch').value.toLowerCase();
            const cat = document.getElementById('fCat').value;
            const diff = document.getElementById('fDiff').value;
            const market = document.getElementById('fMarket').value;
            const sort = document.getElementById('fSort').value;

            let arr = ideas.filter(i => {
                const mSearch = i.title.toLowerCase().includes(search) || i.description.toLowerCase().includes(search);
                const mCat = cat === 'All' || i.category === cat;
                const mDiff = diff === 'All' || i.difficulty_score.toString() === diff;
                const mMarket = market === 'All' || i.market_potential === market;
                return mSearch && mCat && mDiff && mMarket;
            });

            arr.sort((a,b) => {
                if(sort === 'votes') return b.upvotes - a.upvotes;
                if(sort === 'viability') return calculateViability(b) - calculateViability(a);
                if(sort === 'popularity') return b.popularity_score - a.popularity_score;
                if(sort === 'difficulty') return a.difficulty_score - b.difficulty_score;
                if(sort === 'alpha') return a.title.localeCompare(b.title);
                return new Date(b.created_at) - new Date(a.created_at); // newest
            });
            return arr;
        }

        function renderApp() {
            const filtered = getFiltered();
            document.getElementById('resultCount').textContent = `Showing ${filtered.length} of ${ideas.length} ideas`;
            
            const trendingIds = [...ideas].sort((a,b) => b.popularity_score - a.popularity_score).slice(0,3).map(i=>i.id);

            if(currentView === 'grid') {
                document.getElementById('viewGrid').innerHTML = filtered.map(idea => createCardHTML(idea, trendingIds.includes(idea.id))).join('');
            } else {
                document.getElementById('viewCompact').innerHTML = filtered.map(idea => `
                    <div class="compact-item glass" onclick="openDetail('${idea.id}')" style="cursor:pointer">
                        <div style="flex:1">
                            <strong>${idea.title}</strong>
                            <span style="font-size: 0.75rem; color: var(--text-muted); margin-left: 1rem;">${idea.category} • Diff ${idea.difficulty_score} • Market ${idea.market_potential} • Views ${idea.view_count}</span>
                        </div>
                        <div>
                            <span class="badge" style="margin-right:1rem">⭐ ${calculateViability(idea)}</span>
                            <button class="btn btn-outline" style="padding: 0.25rem 0.5rem;" onclick="handleUpvote('${idea.id}', event)">👍 ${idea.upvotes}</button>
                        </div>
                    </div>
                `).join('');
            }

            updateDashboardStats();
            updateCharts();
        }

        function createCardHTML(idea, isTrending) {
            const vScore = calculateViability(idea);
            const maxV = 100;
            const pct = Math.min(Math.max((vScore / maxV) * 100, 5), 100);
            
            const isOwner = currentUser && idea.author_name === currentUser;
            const authActions = isOwner ? `
                <button class="btn btn-outline" title="Edit" onclick="editIdeaSetup('${idea.id}', event)">✏️</button>
                <button class="btn btn-outline" title="Toggle Visibility" onclick="toggleVisibility('${idea.id}', event)">👁️</button>
                <button class="btn btn-outline" style="color:var(--danger)" title="Delete" onclick="deleteIdea('${idea.id}', event)">🗑️</button>
            ` : '';

            return `
                <div class="idea-card glass">
                    <div class="card-header">
                        <div>
                            <div class="card-title" onclick="openDetail('${idea.id}')">${idea.title}</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);">by ${idea.author_name} | Views: ${idea.view_count}</div>
                        </div>
                        <div class="badges" style="justify-content: flex-end;">
                            ${isTrending ? '<span class="badge trending-badge">🔥 Top Trending</span>' : ''}
                            ${idea.visibility === 'hidden' ? '<span class="badge" style="background:#000;color:#fff">Hidden</span>' : ''}
                            ${idea.visibility === 'archived' ? '<span class="badge" style="background:#4b5563;color:#fff">Archived</span>' : ''}
                            <span class="badge">${idea.category}</span>
                            <span class="badge badge-diff-${idea.difficulty_score}">D: ${idea.difficulty_score}/5</span>
                        </div>
                    </div>
                    <div class="badges">
                        <span class="badge" style="background:var(--bg-body)">📈 ${idea.market_potential} Market</span>
                        ${idea.tags.map(t => `<span class="badge" style="background:var(--bg-body)">#${t}</span>`).join('')}
                    </div>
                    <div>
                        <div class="desc-text">${idea.description}</div>
                    </div>
                    <div style="margin-top: auto;">
                        <div style="display:flex; justify-content:space-between; font-size: 0.75rem; margin-bottom:4px;">
                            <span>Viability Score</span>
                            <strong>${vScore} pts</strong>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar" style="width:${pct}%; background:${pct>50?'var(--success)':'var(--primary)'}"></div>
                        </div>
                    </div>
                    <div class="ai-actions mt-1">
                        <button class="btn btn-primary" style="flex:1" onclick="handleUpvote('${idea.id}', event)">👍 ${idea.upvotes}</button>
                        ${authActions}
                    </div>
                </div>
            `;
        }

        window.openDetail = async function(id) {
            try {
                const fullIdea = await apiFetch(`/ideas/${id}`);
                const idx = ideas.findIndex(i => i.id == id);
                if(idx !== -1) ideas[idx].view_count = fullIdea.view_count; // update local

                document.getElementById('mdlTitle').textContent = fullIdea.title;
                document.getElementById('mdlAuthor').textContent = fullIdea.author_name;
                document.getElementById('mdlDate').textContent = new Date(fullIdea.created_at).toLocaleString();
                document.getElementById('mdlUpdated').textContent = new Date(fullIdea.updated_at).toLocaleString();
                document.getElementById('mdlViews').textContent = fullIdea.view_count;
                document.getElementById('mdlDesc').textContent = fullIdea.description;
                document.getElementById('mdlProb').textContent = fullIdea.problem_statement;
                
                document.getElementById('mdlBadges').innerHTML = `
                    <span class="badge">${fullIdea.category}</span>
                    <span class="badge badge-diff-${fullIdea.difficulty_score}">Difficulty: ${fullIdea.difficulty_score}/5</span>
                    <span class="badge">Market: ${fullIdea.market_potential}</span>
                    <span class="badge trending-badge">⭐ PopScore: ${fullIdea.popularity_score}</span>
                    ${fullIdea.tags ? fullIdea.tags.map(t => `<span class="badge" style="background:var(--bg-body)">#${t}</span>`).join('') : ''}
                `;

                document.getElementById('resPitch').classList.add('d-none');
                document.getElementById('btnGenPitch').onclick = () => {
                    document.getElementById('resPitch').innerHTML = `<strong>Simulated Pitch:</strong><br/>Provides revolutionary efficiencies for ${fullIdea.category}.`;
                    document.getElementById('resPitch').classList.remove('d-none');
                };

                document.getElementById('detailModal').classList.add('active');
                renderApp(); // To update the incremented view count on the card
            } catch(e) {}
        };

        window.closeModal = function(mId) {
            document.getElementById(mId).classList.remove('active');
        }

        function setView(view) {
            currentView = view;
            localStorage.setItem('validator_view', view);
            document.querySelectorAll('.view-controls .btn').forEach(b => {
                b.classList.replace('btn-primary', 'btn-outline');
                if(b.textContent.toLowerCase() === view) b.classList.replace('btn-outline', 'btn-primary');
            });
            document.getElementById('viewGrid').style.display = view === 'grid' ? 'grid' : 'none';
            document.getElementById('viewCompact').style.display = view === 'compact' ? 'flex' : 'none';
            renderApp();
        }

        function setTheme(theme) {
            currentTheme = theme;
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('validator_theme', theme);
            updateNav();
            if(window.myCharts) updateCharts();
        }

        function updateDashboardStats() {
            document.getElementById('sTotal').textContent = ideas.length;
            document.getElementById('sVotes').textContent = ideas.reduce((a,b)=>a+b.upvotes, 0);
            
            if(ideas.length === 0) {
                document.getElementById('sViability').textContent = '0';
                document.getElementById('sCat').textContent = '-';
                return;
            }

            const avgV = ideas.reduce((a,b)=>a+calculateViability(b), 0) / ideas.length;
            document.getElementById('sViability').textContent = avgV.toFixed(0);

            let cats = {};
            ideas.forEach(i => cats[i.category] = (cats[i.category]||0)+1);
            let topCat = Object.keys(cats).sort((a,b)=>cats[b]-cats[a])[0];
            document.getElementById('sCat').textContent = topCat || '-';
        }

        function initCharts() {
            const chartCol = document.documentElement.getAttribute('data-theme') === 'dark' ? '#fff' : '#000';
            Chart.defaults.color = chartCol;
            Chart.defaults.font.family = 'Poppins';

            const ctxC = document.getElementById('chartCat').getContext('2d');
            const ctxD = document.getElementById('chartDiff').getContext('2d');

            window.myCharts = {
                cat: new Chart(ctxC, {
                    type: 'doughnut',
                    data: { labels: [], datasets: [{ data: [], backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'] }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins:{title:{display:true, text:'Ideas by Category'}} }
                }),
                diff: new Chart(ctxD, {
                    type: 'bar',
                    data: { labels: ['1(Easy)','2','3','4','5(Hard)'], datasets: [{ label:'Count', data: [0,0,0,0,0], backgroundColor: DIFF_COLORS }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins:{title:{display:true, text:'Difficulty Distribution'}, legend:{display:false}} }
                })
            };
        }

        function updateCharts() {
            if(!window.myCharts) return;
            const chartCol = currentTheme === 'dark' ? '#9ca3af' : '#6b7280';
            Chart.defaults.color = chartCol;

            let cData = {};
            ideas.forEach(i => cData[i.category] = (cData[i.category]||0)+1);
            window.myCharts.cat.data.labels = Object.keys(cData);
            window.myCharts.cat.data.datasets[0].data = Object.values(cData);
            window.myCharts.cat.update();

            let dData = [0,0,0,0,0];
            ideas.forEach(i => { if(i.difficulty_score>=1 && i.difficulty_score<=5) dData[i.difficulty_score-1]++; });
            window.myCharts.diff.data.datasets[0].data = dData;
            window.myCharts.diff.update();
        }

        function triggerConfetti() {
            const canvas = document.getElementById('confettiCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const pieces = [];
            for(let i=0; i<100; i++) {
                pieces.push({
                    x: canvas.width/2, y: canvas.height/2 + 200,
                    vx: (Math.random()-0.5)*20, vy: (Math.random()-1)*20 - 5,
                    size: Math.random()*10+5,
                    color: ['#f44336','#e91e63','#9c27b0','#3f51b5','#2196f3','#4caf50','#ffeb3b','#ff9800'][Math.floor(Math.random()*8)]
                });
            }

            function animate() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                let active = false;
                pieces.forEach(p => {
                    p.x += p.vx; p.y += p.vy; p.vy += 0.5; // gravity
                    if(p.y < canvas.height) active = true;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                });
                if(active) requestAnimationFrame(animate);
                else ctx.clearRect(0,0,canvas.width,canvas.height);
            }
            animate();
        }

        function showToast(msg, isError=false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = isError ? 'toast show error' : 'toast show';
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        init();
    </script>
</body>
</html>
